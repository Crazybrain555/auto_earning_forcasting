interface:
  display_name: "Technology Company Profit Forecasting"
  short_description: "Build audited current technology-company operating, profit, cash-flow and valuation models"
  default_prompt: "Use $technology-company-profit-forecasting in live_forecast. Initialize the run workspace and read the mode router first; freeze the current as_of and enforce the Source Pack publication boundary. Complete filings, calls, products, customers, supply, papers/patents, management, moat, recurring-contract stock/renewal/expansion/recognition bridges when applicable, recurring-versus-discrete GAAP state and cash-tax bridges, a formula-driven XLSX, cash flow, scenarios, valuation, reverse implied expectations, forward-evidence SignalCards, an independent red team, the strict delivery validator, and an immutable snapshot. Route unvalidated economics or unverifiable conclusion-critical data to human-required. Do not train, backtest, or revise the forecasting method here; that belongs to the companion trainer skill."
