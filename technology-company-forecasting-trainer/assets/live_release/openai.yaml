interface:
  display_name: "Technology Company Profit Forecasting"
  short_description: "Build audited current technology-company operating, profit, cash-flow and valuation models"
  default_prompt: "Use $technology-company-profit-forecasting in live_forecast. Initialize the run workspace; let the runtime record its snapshot time, then use all current evidence obtainable through evidence/model freeze. Complete filings, calls, products, customers, supply, papers/patents, management, moat, recurring-contract stock/renewal/expansion/recognition bridges when applicable, recurring-versus-discrete GAAP state and cash-tax bridges, a formula-driven XLSX, cash flow, scenarios, valuation, reverse implied expectations, forward-evidence SignalCards, an independent red team, the strict delivery validator, and an immutable snapshot. Route unvalidated economics or unverifiable conclusion-critical data to human-required. Keep the released method package unchanged during case execution; material new evidence creates a new forecast version."
