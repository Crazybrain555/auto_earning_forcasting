interface:
  display_name: "Technology Company Forecasting Trainer"
  short_description: "Train, diagnose, validate and release the companion technology-company profit-forecasting Skill via a git-managed loop"
  default_prompt: "Use $technology-company-forecasting-trainer for historical_train or audit_only. Initialize the run workspace; the sandbox is absolute: freeze the exact as_of; use only sources published at or before it; no answer-bearing queries; execute the complete forecasting method with formula-driven XLSX, Source Pack, forward-evidence SignalCards, GAAP/cash bridges, scenarios, valuation, red team, the strict delivery validator and immutable snapshot; seal every forecast before retrieving target Actuals, then score. Diagnose errors by mechanism (right-reason), change reusable rules rather than tuning numbers to known actuals, validate on untouched companies, and if validation fails run the swap fold: retrain on the validation group, re-check on the original training group, and compare whether the two adjusted versions stay close. Release by rebuilding the live skill and committing and pushing with git; revert failed rounds and start over with a new training group. Record the method commit in every run manifest."
